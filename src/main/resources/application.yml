server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/SP-reservations?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  security:
    jwt:
      secret: ${JWT_SECRET_KEY}
      expiration: 3600000

services:
    url-notification: http://localhost:8082